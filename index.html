<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control de Inventario</title>
    <link rel="stylesheet" href="assets/css/estilos.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <h1>Sistema de Control de Inventario</h1>
            <p>Dashboard de consulta para videojuegos disponibles</p>
        </div>
    </header>

    <main class="dashboard-layout">
        
        <section class="admin-section">
            <h2 class="section-title">Agregar Nuevo Videojuego</h2>
            <form id="game-form" class="admin-form">
                <div class="form-group">
                    <label for="form-nombre">Nombre</label>
                    <input type="text" id="form-nombre" required placeholder="Ej: Resident Evil 4">
                </div>
                <div class="form-group">
                    <label for="form-plataforma">Plataforma</label>
                    <select id="form-plataforma" required>
                        <option value="PS5">PS5</option>
                        <option value="PC">PC</option>
                        <option value="Nintendo Switch">Nintendo Switch</option>
                        <option value="Xbox">Xbox</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="form-clasificacion">Clasificación</label>
                    <input type="text" id="form-clasificacion" required placeholder="Ej: Premium, Económico">
                </div>
                <div class="form-group">
                    <label for="form-precio">Precio ($)</label>
                    <input type="number" id="form-precio" required min="0" placeholder="Ej: 59990">
                </div>
                <div class="form-group">
                    <label for="form-stock">Stock Inicial</label>
                    <input type="number" id="form-stock" required min="0" placeholder="Ej: 10">
                </div>
                <button type="submit" class="btn-submit">Agregar al Inventario</button>
            </form>
        </section>

        <section id="games-container" class="games-grid">
            </section>

        <section id="summary-container" class="summary-wrapper">
            </section>
    </main>

    <script src="assets/js/datos.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
